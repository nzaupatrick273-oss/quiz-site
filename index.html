<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎯 Quiz Master Pro</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- Animated Background -->
    <div class="background" aria-hidden="true">
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
        <span></span>
    </div>

    <div class="quiz-container">
        <!-- Title -->
        <h1>🎯 Quiz Master Pro</h1>

        <!-- START SCREEN -->
        <div class="start-screen" id="startScreen">
            
            <!-- ACCOUNT SECTION -->
            <div id="authContainer"></div>

            <div class="settings-card">
                <div class="form-group">
                    <label for="category">📚 Category</label>
                    <select id="category">
                        <option value="bible">📖 Bible</option>
                        <option value="general">🎲 General Knowledge</option>
                        <option value="music">🎵 Music</option>
                        <option value="movies">🎬 Movies</option>
                        <option value="religion">🕊️ Religion</option>
                        <option value="travel">✈️ Travel</option>
                        <option value="physics">🔬 Physics</option>
                        <option value="survey">📊 Survey</option>
                        <option value="online">🌐 Online</option>
                        <option value="etiquette">🤝 Etiquette</option>
                        <option value="talents">🎭 Talents</option>
                        <option value="geography">🌍 Geography</option>
                        <option value="technology">💻 Technology</option>
                        <option value="history">📜 History</option>
                        <option value="sports">⚽ Sports</option>
                        <option value="science">🧪 Science</option>
                        <option value="literature">📚 Literature</option>
                        <option value="animals">🐾 Animals</option>
                        <option value="space">🚀 Space</option>
                        <option value="food">🍕 Food</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="theme">🎨 Theme</label>
                    <select id="theme">
                        <option value="default">🌈 Default</option>
                        <option value="galaxy">🌌 Galaxy</option>
                        <option value="ocean">🌊 Ocean</option>
                        <option value="forest">🌳 Forest</option>
                        <option value="neon">🎨 Neon</option>
                        <option value="fire">🔥 Fire</option>
                        <option value="ice">❄ Ice</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="gameMode">🎮 Game Mode</label>
                    <select id="gameMode">
                        <option value="single">🧑 Single Player</option>
                        <option value="multiplayer">👥 Multiplayer</option>
                    </select>
                </div>

                <!-- Multiplayer settings (hidden by default) -->
                <div id="multiplayerSettings" style="display: none;">
                    <div class="form-group">
                        <label for="roomCode">🔑 Room Code</label>
                        <input type="text" id="roomCode" placeholder="Enter room code or leave blank to create" style="
                            padding: 8px 12px;
                            border-radius: 8px;
                            border: 1px solid rgba(255,255,255,0.2);
                            background: rgba(255,255,255,0.1);
                            color: white;
                            width: 100%;
                            font-size: 1rem;
                        ">
                    </div>
                    <div class="form-group">
                        <label for="playerName">👤 Your Name</label>
                        <input type="text" id="playerName" placeholder="Enter your display name" style="
                            padding: 8px 12px;
                            border-radius: 8px;
                            border: 1px solid rgba(255,255,255,0.2);
                            background: rgba(255,255,255,0.1);
                            color: white;
                            width: 100%;
                            font-size: 1rem;
                        ">
                    </div>
                </div>

                <div class="form-group">
                    <label for="timeLimit">⏱️ Time Limit</label>
                    <select id="timeLimit">
                        <option value="30">30 seconds</option>
                        <option value="45" selected>45 seconds</option>
                        <option value="60">60 seconds</option>
                        <option value="90">90 seconds</option>
                        <option value="120">120 seconds</option>
                    </select>
                </div>

                <button onclick="startSelectedQuiz()" class="btn-primary">
                    🚀 Start Quiz
                </button>
            </div>
        </div>

        <!-- QUIZ SCREEN -->
        <div id="quizArea" class="quiz-area" style="display:none;">
            <!-- Progress Bar -->
            <div class="progress-container">
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
                <div class="progress-text">
                    <span id="questionCounter">1 / 20</span>
                    <span id="scoreDisplay">⭐ 0</span>
                </div>
            </div>

            <!-- Controls -->
            <div class="quiz-controls">
                <button id="pauseBtn" onclick="togglePause()" class="btn-pause">
                    ⏸️ Pause
                </button>
                <div id="timer" class="timer">⏱️ 30s</div>
            </div>

            <!-- Multiplayer Lobby (hidden by default) -->
            <div id="multiplayerLobby" style="display: none; margin-bottom: 20px;">
                <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <strong>Room:</strong> <span id="roomCodeDisplay">------</span>
                            <span style="margin-left: 20px;"><strong>Players:</strong> <span id="playerCount">1</span></span>
                        </div>
                        <button onclick="startMultiplayerGame()" class="btn-primary" style="padding: 6px 12px; font-size: 0.8rem;">🚀 Start Game</button>
                    </div>
                    <div id="playerList" style="margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px;">
                        <!-- Players will appear here -->
                    </div>
                </div>
            </div>

            <!-- Question -->
            <h2 id="question" class="question-text">Loading...</h2>

            <!-- Answers -->
            <div id="answers" class="answers-container"></div>
        </div>

        <!-- RESULT SCREEN -->
        <div id="resultScreen" class="result-screen" style="display:none;">
            <div class="result-card">
                <h2 id="resultTitle">🎉 Quiz Complete!</h2>
                <div class="score-circle">
                    <span id="finalScore">0</span>
                    <span class="total">/ 20</span>
                </div>
                <p id="resultMessage" class="result-message">Great job!</p>
                <div class="result-stats">
                    <div class="stat">
                        <span>✅ Correct</span>
                        <strong id="correctCount">0</strong>
                    </div>
                    <div class="stat">
                        <span>❌ Wrong</span>
                        <strong id="wrongCount">0</strong>
                    </div>
                    <div class="stat">
                        <span>📊 Accuracy</span>
                        <strong id="accuracy">0%</strong>
                    </div>
                </div>
                <button onclick="location.reload()" class="btn-primary">
                    🔄 Play Again
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
